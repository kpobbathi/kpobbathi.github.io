            </div>
            <div class="card">
                <h2>Block the Fish</h2>
                <p id="text_"></p>
                <p id="games"></p>
            </div>
            <div class="game-wrapper">

            <script>
                let game = 1;
                let fish_color;
                const fish_size = [75, 50];
                let fish_speed = 5;
                const bubble_size = 10;
                let x = 0;
                let x1;
                let y;
                let y1;
                let blocker_y;
                const blocker_speed = 5;
                let score = 0;
                let game_ended = false;
                let stop_start1 = true;
                let scene = 1;
                let never_ending;
                let level = 1;
                const the_games = document.getElementById("games");
                let scale_num = 2.0;
                let canvas_size = 400 * scale_num

                function X_and_y(x1, y1, x2, y2) {
                    this.x1 = x1;
                    this.y1 = y1;
                    this.x2 = x2;
                    this.y2 = y2;
                }

                let sides = new X_and_y(17, 342, 113, 368);
                let sides1 = new X_and_y(325, 342, 390, 368);
                let b1 = new X_and_y(120, 120, 280, 180);
                let b2 = new X_and_y(120, 195, 280, 255);
                let b3 = new X_and_y(120, 270, 280, 330);
                let b4 = new X_and_y(30, 112.5, 120, 350);
                let b5 = new X_and_y(280, 112.5, 370, 330);

                let games = {
                    "Block the fish" : "This is my game called <em><strong> Block the Fish.</strong><em> It is a game where you are trying to block the fish with the blocker."
                }

                let keys = Object.keys(games);
                let values = Object.values(games);
                let reply = document.getElementById("text_");
                the_games.innerHTML = 'The games currently are "' + keys.join('", "') + '".';


                function handle_button (func, b) {
                    let scaledMouseX = mouseX / scale_num
                    let scaledMouseY = mouseY / scale_num

                    if (scaledMouseX >= b.x1 && scaledMouseX <= b.x2 && scaledMouseY >= b.y1 && scaledMouseY <= b.y2) {
                        func();
                    }
                }

                function setup_fish() {
                    x1 = random(0, 300);
                    y = random(50, 350);
                    y1 = y;
                    blocker_y = 175;
                    change_color();
                    while (y + 25 >= blocker_y && y - 75 <= blocker_y) {
                        y = random(50, 350);
                    }
                }

                function randomize() {
                    y = random(50, 350);
                    while (y + 25 >= blocker_y && y - 75 <= blocker_y) {
                        y = random(50, 350);
                    }
                }

                function randomize1() {
                    x1 = random(0, 300);
                    y1 = y;
                }

                function change_color() {
                    fish_color = color(random(100, 255), random(100, 255), random(100, 255));
                }

                function draw_bubbles(x, y) {
                    stroke(255, 255, 255);
                    strokeWeight(3);
                    noFill();
                    ellipse(x1 + 50, y1 - 5, bubble_size, bubble_size);
                }

                function draw_fish(x, y) {
                    noStroke();
                    fill(fish_color);
                    ellipse(x, y, fish_size[0], fish_size[1]);
                    let tail_width = fish_size[0]/2;
                    let tail_height = fish_size[1]/4;
                    triangle(x - fish_size[0]/2 + 3, y, x - fish_size[0]/2 - tail_width, y - tail_height, x - fish_size[0]/2 - tail_width, y + tail_height);
                    fill(33, 33, 33);
                    ellipse(x + fish_size[0]/4, y, fish_size[0]/5, fish_size[1]/5);
                    
                    if (fish_color === color(255, 255, 255)) {
                        fill(0, 0, 0);
                        textSize(16);
                        text("This rare fish is worth 10 points!", x - 100, y - 40);
                    }
                }

                function draw_kelp(x, height) {
                    stroke(0, 150, 0);
                    strokeWeight(4);
                    line(x, 400, x, 400 - height);
                }

                function draw_restart_button() {
                    rectMode(CORNERS)
                    stroke(0, 0, 0);
                    strokeWeight(3);
                    fill(255, 255, 255);
                    rect(sides.x1, sides.y1, sides.x2, sides.y2);
                    fill(0, 0, 0);
                    noStroke();
                    textSize(14);
                    text("PLAY AGAIN", 23, 360);
                }

                function draw_stop_button() {
                    rectMode(CORNERS)
                    stroke(0, 0, 0);
                    strokeWeight(3);
                    fill(255, 255, 255);
                    rect(sides1.x1, sides1.y1, sides1.x2, sides1.y2);
                    fill(0, 0, 0);
                    noStroke();
                    textSize(16);
                    text("PAUSE", sides1.x1 + 8, sides1.y1 + 5, 55, 100);
                }

                function draw_blocker(y) {
                    noStroke();
                    fill(255, 150, 0);
                    rect(375, y, 10, 50);
                    
                    if (keyIsPressed) {
                        if (keyCode === UP_ARROW) {
                            if (blocker_y > 0) {
                                blocker_y -= blocker_speed;
                            }
                        }
                        if (keyCode === DOWN_ARROW) {
                            if (blocker_y < 350) {
                                blocker_y += blocker_speed;
                            }
                        }
                    }
                }

                function draw_scene_1() {
                    background(0, 0, 0);
                    
                    rectMode(CORNER);
                    draw_stop_button();
                    rectMode(CENTER);
                    
                    fill(255, 0, 0);
                    textSize(35);
                    text("Block the Fish", 30, 75);
                    draw_fish(350, 60);
                    change_color();
                    
                    fill(0, 0, 0);
                    stroke(255, 0, 0);
                    strokeWeight(5);
                    
                    for (let k = 0; k < 3; k++) {
                        rect(200, 150 + k*75, 150, 50);
                    }
                    
                    let scaledMouseX = mouseX / scale_num;
                    let scaledMouseY = mouseY / scale_num;
                    
                    if (mouseIsPressed) {
                        handle_button(function() {
                            scene = 2;
                        }, b1)

                        handle_button(function() {
                            fish_speed *= 2;
                            scene = 2;
                        }, b2)

                        handle_button(function() {
                            fish_speed *= 3;
                            scene = 2;
                        }, b3)
                    }
                    fill(255, 0, 0);
                    noStroke();
                    text("Easy", 170, 160);
                    text("Medium", 142.5, 235);
                    text("Hard", 170, 310);
                }

                function draw_scene_2() {
                    background(0, 0, 0);
                    
                    rectMode(CORNER);
                    draw_stop_button();
                    rectMode(CENTER);
                    
                    fill(255, 0, 0);
                    textSize(35);
                    text("Block the Fish", 30, 75);
                    draw_fish(350, 60);
                    change_color();
                    
                    fill(0, 0, 0);
                    stroke(255, 0, 0);
                    strokeWeight(5);
                    
                    rectMode(CORNERS);
                    rect(b4.x1, b4.y1, b4.x2, b4.y2);
                    rect(b5.x1, b5.y1, b5.x2, b5.y2);
                    
                    fill(255, 0, 0);
                    noStroke();
                    textSize(28);
                    text("N O  R M A    L", 62, 130, 50, 300);
                    
                    textSize(14);
                    text("N E V E R E N D I N G", 320, 130, 19, 300);
                    
                    let scaledMouseX = mouseX / scale_num;
                    let scaledMouseY = mouseY / scale_num;
                    
                    if (mouseIsPressed) {
                        handle_button(function() {
                            never_ending = false;
                            if (scene === 2) {
                                scene = 3;
                            }
                        }, b4)

                        handle_button(function() {
                            never_ending = true;
                            scene = 3;
                        }, b5)
                    }
                }

                function draw_scene_3() {
                    rectMode(CORNER);
                    noStroke();
                    
                    fill(0, 0, 0);
                    textSize(16);
                    text("Score:", 10, 20);
                    if (never_ending === false) {
                        text("To beat the game, get 150 points.", 160, 20);
                        text("Level " + level + "/5", 75, 20);
                        textSize(12);
                        text("Use the up and down arrows to control the blocker.", 123, 40);
                        text("The pause button will save your progress.", 172, 60);
                    }
                    else {
                        textSize(14);
                        text("Use the up and down arrows to control the blocker.", 123-25, 20);
                        text("The pause button will save your progress.", 172-25, 40);
                    }
                    fill(255, 0, 0);
                    textSize(30);
                    text(score, 14, 55);
                    
                    draw_kelp(50, 170);
                    draw_kelp(25, 145);
                    draw_kelp(75, 145);
                    draw_kelp(100, 120);
                    draw_kelp(125, 70);
                    draw_kelp(150, 95);
                    draw_kelp(200, 70);
                    draw_kelp(250, 120);
                    draw_kelp(275, 145);
                    draw_kelp(300, 170);
                    draw_kelp(325, 95);
                    draw_kelp(350, 120);
                    
                    noStroke();
                    fill(255, 220, 0);
                    rect(-1, 370, 402, 51);
                    
                    draw_blocker(blocker_y);
                    draw_fish(x, y);
                    draw_stop_button();
                    
                    if (score < 31) {
                        x += fish_speed;
                        level = 1;
                    }
                    else if (score > 30 && score < 61) {
                        x += fish_speed * 3/2;
                        level = 2;
                    }
                    else if (score > 60 && score < 91) {
                        x += fish_speed * 12/5;
                        level = 3;
                    }
                    else if (score > 90 && score < 121) {
                        x += fish_speed * 4;
                        level = 4;
                    }
                    else {
                        x += fish_speed * 5;
                        level = 5;
                    }
                    
                    if (y1 < 0) {
                        randomize1();
                        x1 = x;
                    }
                    
                    draw_bubbles(x1, y1);
                    y1 -= 5;
                    
                    if (y <= blocker_y + 75 && y >= blocker_y - 25 && x + 50 >= 375) {
                        if (fish_color === color(255, 255, 255)) {
                            score += 10;
                        }
                        else {
                            score++;
                        }
                        
                        x = 0;
                        randomize();
                        change_color();
                    }
                    
                    if (game_ended === true || never_ending === true) {
                        draw_restart_button();
                        
                        if (mouseIsPressed) {
                            handle_button(function() {
                                score = 0;
                                blocker_y = 175;
                                randomize();
                                x = 0;
                                change_color();
                                scene = 1;
                                fish_speed = 5;
                            }, sides)
                            
                        }
                    }
                    
                    if (x >= 400) {
                        change_color();
                        x = 0;
                        randomize();
                    }
                    
                    if (never_ending === false) {
                        if (score >= 150) {
                            game_ended = true;
                            textSize(35);
                            text("You beat the game!", 50, 200);
                        }
                        else {
                            game_ended = false;
                        }
                    }
                }

                function setup() {
                    createCanvas(canvas_size, canvas_size);
                    
                    let canvas = document.querySelector('canvas');
                    canvas.tabIndex = 1;
                    canvas.style.outline = 'none';
                    
                    canvas.addEventListener('keydown', function(e) {
                        if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                            e.preventDefault();
                        }
                    });

                    document.querySelector('.game-wrapper').prepend(canvas);
        
                    setup_fish();
                    
                    textFont('serif');
                }

                function draw() {
                    scale(scale_num);
                    
                    if (game === 1) {
                        background(0, 200, 255);
                        noStroke();

                        if (scene === 1) {
                            draw_scene_1();
                        }
                        else if (scene === 2) {
                            draw_scene_2();
                        }
                        else if (scene === 3) {
                            draw_scene_3();
                        }
                    }
                }

                function mouseClicked() {
                    if (game === 1) {
                        let scaledMouseX = mouseX / scale_num;
                        let scaledMouseY = mouseY / scale_num;

                        handle_button(function() {
                            if (stop_start1 === true) {
                                stop_start1 = false;
                                noLoop();
                            }
                            else if (stop_start1 === false) {
                                stop_start1 = true;
                                loop();
                            }
                        }, sides1)
                    }
                }
                
            </script>

            </div>

            <!-- Harry Potter Trivia Game -->

                <!-- Question Screen -->
                <div id="trivia-question" class="trivia-screen" style="display:none;">

                    </div>
                </div>
            </div>

            <style>
                #trivia-game {
                    max-width: 680px;
                    margin: 0 auto 2rem;
                    padding: 0 1.5rem;
                    font-family: 'Lora', Georgia, serif;
                }
                .trivia-screen { animation: fadeIn 0.3s ease; }
                @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

                #trivia-select {
                    background: var(--card-bg);
                    border-radius: var(--radius);
                    padding: 2rem;
                    box-shadow: var(--shadow-md);
                    border: 1px solid var(--border);
                    text-align: center;
                }
                #trivia-select h3 {
                    font-size: 1.4rem;

                    margin-bottom: 1.5rem;
                }
                .trivia-diff-grid {
                    display: grid;
                    grid-template-columns: 1fr 1fr;

                .diff-btn {
                    padding: 0.85rem 1rem;
                    border: none;
                    border-radius: 10px;
                    font-family: 'Lora', Georgia, serif;
                    font-size: 1rem;
                    font-weight: 600;
                    cursor: pointer;
                    transition: transform 0.15s, box-shadow 0.15s;
                    color: white;
                }
                .diff-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
                .diff-easy   { background: #22c55e; }
                .diff-medium { background: #f59e0b; }
                .diff-hard   { background: #ef4444; }
                .diff-insane { background: #7c3aed; }

                #trivia-question {
                    background: var(--card-bg);
                    border-radius: var(--radius);
                    padding: 2rem;
                    box-shadow: var(--shadow-md);
                    border: 1px solid var(--border);
                }
                .trivia-meta {
                    display: flex;
                    justify-content: space-between;
                    font-size: 0.88rem;
                    color: var(--text-muted);
                    margin-bottom: 0.5rem;
                }
                .trivia-progress-bar {
                    height: 6px;
                    background: var(--border);
                    border-radius: 3px;
                    margin-bottom: 1.5rem;
                    overflow: hidden;
                }
                #trivia-bar {
                    height: 100%;
                    background: var(--accent);
                    border-radius: 3px;
                    transition: width 0.4s ease;
                }
                .trivia-q-text {
                    font-size: 1.15rem;
                    font-weight: 600;
                    color: var(--text);
                    margin-bottom: 1.25rem;
                    line-height: 1.5;
                }
                .trivia-choices {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: 0.75rem;
                }
                .choice-btn {
                    padding: 0.75rem 1rem;
                    border: 2px solid var(--border);
                    border-radius: 10px;
                    background: var(--bg);
                    font-family: 'Lora', Georgia, serif;
                    font-size: 0.92rem;
                    cursor: pointer;
                    text-align: left;
                    transition: border-color 0.15s, background 0.15s;
                    line-height: 1.4;
                }
                .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(59,130,246,0.06); }
                .choice-btn.correct { border-color: #22c55e; background: #f0fdf4; color: #15803d; font-weight: 600; }
                .choice-btn.wrong   { border-color: #ef4444; background: #fef2f2; color: #b91c1c; }
                .choice-btn:disabled { cursor: default; }

                .trivia-feedback {
                    margin-top: 1rem;
                    font-size: 0.92rem;
                    font-weight: 600;
                    min-height: 1.4rem;
                }
                .trivia-next-btn {
                    margin-top: 1.25rem;
                    padding: 0.6rem 1.4rem;
                    background: var(--accent);
                    color: white;
                    border: none;
                    border-radius: 8px;
                    font-family: 'Lora', Georgia, serif;
                    font-size: 0.95rem;
                    font-weight: 600;
                    cursor: pointer;
                    transition: background 0.2s;
                }
                .trivia-next-btn:hover { background: var(--accent-hover); }

                #trivia-results {
                    background: var(--card-bg);
                    border-radius: var(--radius);
                    padding: 2.5rem 2rem;
                    box-shadow: var(--shadow-md);
                    border: 1px solid var(--border);
                }
                .trivia-results-inner { text-align: center; }
                .trivia-emoji { font-size: 3.5rem; margin-bottom: 0.75rem; }
                .trivia-results-inner h3 { font-size: 1.5rem; color: var(--primary); margin-bottom: 0.5rem; }
                .trivia-results-inner p  { color: var(--text-muted); margin-bottom: 0.5rem; }
            </style>

            <script>
                const triviaQuestions = {
                    easy: [
                        { q: "What is Harry Potter's owl's name?", choices: ["Errol", "Hedwig", "Pigwidgeon", "Hermes"], answer: 1 },
                        { q: "What Hogwarts house is Harry Potter sorted into?", choices: ["Slytherin", "Ravenclaw", "Hufflepuff", "Gryffindor"], answer: 3 },
                        { q: "What sport do wizards play on broomsticks?", choices: ["Bludgeball", "Quidditch", "Seekball", "Wizball"], answer: 1 },
                        { q: "What platform does the Hogwarts Express leave from?", choices: ["Platform 7", "Platform 10", "Platform 9¾", "Platform 8½"], answer: 2 },
                        { q: "Who is Harry Potter's best friend?", choices: ["Neville Longbottom", "Dean Thomas", "Ron Weasley", "Seamus Finnigan"], answer: 2 },
                        { q: "Who is the headmaster of Hogwarts when Harry arrives?", choices: ["Professor McGonagall", "Professor Snape", "Cornelius Fudge", "Albus Dumbledore"], answer: 3 },
                        { q: "What position does Harry play in Quidditch?", choices: ["Keeper", "Beater", "Chaser", "Seeker"], answer: 3 },
                        { q: "What is the name of the wizarding bank?", choices: ["Diagon Bank", "Gringotts", "Vaultkeep", "Ollivanders"], answer: 1 },
                        { q: "What does the spell 'Wingardium Leviosa' do?", choices: ["Creates fire", "Unlocks doors", "Makes objects levitate", "Disarms an opponent"], answer: 2 },
                        { q: "What animal can Professor McGonagall transform into?", choices: ["Owl", "Dog", "Cat", "Fox"], answer: 2 },
                        { q: "What is the name of the dark lord?", choices: ["Grindelwald", "Morgana", "Voldemort", "Saruman"], answer: 2 },
                        { q: "What house is Draco Malfoy in?", choices: ["Gryffindor", "Hufflepuff", "Ravenclaw", "Slytherin"], answer: 3 },
                        { q: "What is Ron's rat's name?", choices: ["Scabbers", "Crookshanks", "Goyle", "Whiskers"], answer: 0 },
                        { q: "What is Hermione's cat's name?", choices: ["Snowball", "Mittens", "Crookshanks", "Fluffy"], answer: 2 },
                        { q: "Who teaches Potions at Hogwarts?", choices: ["Professor Quirrell", "Professor Flitwick", "Professor Sprout", "Professor Snape"], answer: 3 },
                        { q: "What color is the Hogwarts Express?", choices: ["Blue", "Green", "Black", "Scarlet"], answer: 3 },
                        { q: "Where do the Dursleys live?", choices: ["4 Privet Drive", "12 Grimmauld Place", "The Burrow", "Godric's Hollow"], answer: 0 },
                        { q: "What does the spell 'Expelliarmus' do?", choices: ["Creates a shield", "Disarms the opponent", "Causes pain", "Makes the target invisible"], answer: 1 },
                        { q: "What is Hagrid's first job at Hogwarts?", choices: ["Potions teacher", "Librarian", "Keeper of Keys and Grounds", "Defence Against the Dark Arts teacher"], answer: 2 },
                        { q: "What magical creature guards Azkaban prison?", choices: ["Trolls", "Giants", "Werewolves", "Dementors"], answer: 3 },
                    ],
                    medium: [
                        { q: "What is the form of Harry's Patronus?", choices: ["Doe", "Phoenix", "Stag", "Wolf"], answer: 2 },
                        { q: "Who is the Half-Blood Prince?", choices: ["Harry Potter", "Draco Malfoy", "Tom Riddle", "Severus Snape"], answer: 3 },
                        { q: "What does the spell 'Accio' do?", choices: ["Creates light", "Summons an object", "Creates a shield", "Unlocks doors"], answer: 1 },
                        { q: "What is the name of the Weasley family home?", choices: ["The Nest", "The Burrow", "The Hollow", "The Hive"], answer: 1 },
                        { q: "What does O.W.L. stand for?", choices: ["Ordinary Wizarding Level", "Official Wizarding License", "Outstanding Wizard Learning", "Order of Wizarding Lords"], answer: 0 },
                        { q: "What is the Hogwarts motto?", choices: ["Magic Above All", "Never Tickle a Sleeping Dragon", "Wisdom Bravery Loyalty Cunning", "Knowledge is Power"], answer: 1 },
                        { q: "Who teaches Defence Against the Dark Arts in Harry's third year?", choices: ["Professor Quirrell", "Professor Lockhart", "Professor Lupin", "Professor Moody"], answer: 2 },
                        { q: "How many points is catching the Golden Snitch worth in Quidditch?", choices: ["100 points", "150 points", "200 points", "50 points"], answer: 1 },

                let currentDifficulty = null;
                let currentIndex = 0;
                let currentScore = 0;
                let answered = false;

                function startTrivia(difficulty) {
                    currentDifficulty = difficulty;
                    currentIndex = 0;
                    currentScore = 0;
                    answered = false;
                    document.getElementById('trivia-select').style.display = 'none';
                    document.getElementById('trivia-results').style.display = 'none';
                    document.getElementById('trivia-question').style.display = 'block';
                    showQuestion();
                }

                function showQuestion() {
                    const questions = triviaQuestions[currentDifficulty];
                    const total = questions.length;
                    const q = questions[currentIndex];
                    answered = false;

                    document.getElementById('trivia-progress').textContent = `Question ${currentIndex + 1} of ${total}`;
                    document.getElementById('trivia-score-live').textContent = `Score: ${currentScore}`;
                    document.getElementById('trivia-bar').style.width = ((currentIndex / total) * 100) + '%';
                    document.getElementById('trivia-q-text').textContent = q.q;
                    document.getElementById('trivia-feedback').textContent = '';
                    document.getElementById('trivia-next-btn').style.display = 'none';

                    const choicesEl = document.getElementById('trivia-choices');
                    choicesEl.innerHTML = '';
                    q.choices.forEach((choice, i) => {
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.textContent = choice;
                        btn.onclick = () => selectAnswer(i, btn);
                        choicesEl.appendChild(btn);
                    });
                }

                function selectAnswer(index, btn) {
                    if (answered) return;
                    answered = true;

                    const q = triviaQuestions[currentDifficulty][currentIndex];
                    const allBtns = document.querySelectorAll('.choice-btn');
                    allBtns.forEach(b => b.disabled = true);

                    if (index === q.answer) {
                        btn.classList.add('correct');
                        currentScore++;
                        document.getElementById('trivia-feedback').style.color = '#15803d';
                        document.getElementById('trivia-feedback').textContent = '✓ Correct!';
                    } else {
                        btn.classList.add('wrong');
                        allBtns[q.answer].classList.add('correct');
                        document.getElementById('trivia-feedback').style.color = '#b91c1c';
                        document.getElementById('trivia-feedback').textContent = '✗ Wrong!';
                    }
                    document.getElementById('trivia-score-live').textContent = `Score: ${currentScore}`;
                    document.getElementById('trivia-next-btn').style.display = 'inline-block';
                }

                function nextQuestion() {
                    currentIndex++;
                    const total = triviaQuestions[currentDifficulty].length;
                    if (currentIndex >= total) {
                        showResults();
                    } else {
                        showQuestion();
                    }
                }

                function showResults() {
                    document.getElementById('trivia-question').style.display = 'none';
                    document.getElementById('trivia-results').style.display = 'block';
                    const total = triviaQuestions[currentDifficulty].length;
                    const pct = Math.round((currentScore / total) * 100);

                    let emoji, title, msg;
                    if (pct === 100)      { emoji = '🏆'; title = 'Perfect Score!';     msg = 'You are a true Hogwarts professor!'; }
                    else if (pct >= 80)   { emoji = '⚡'; title = 'Outstanding!';        msg = 'Dumbledore would be proud.'; }
                    else if (pct >= 60)   { emoji = '🧙'; title = 'Exceeds Expectations'; msg = 'A solid witch or wizard!'; }
                    else if (pct >= 40)   { emoji = '📚'; title = 'Acceptable';          msg = 'Keep reading your spell books.'; }
                    else                   { emoji = '🪄'; title = 'Troll';              msg = 'Even Trevor the toad knows more...'; }

                    document.getElementById('trivia-result-emoji').textContent = emoji;
                    document.getElementById('trivia-result-title').textContent = title;
                    document.getElementById('trivia-result-score').textContent = `You scored ${currentScore} out of ${total} (${pct}%)`;
                    document.getElementById('trivia-result-msg').textContent = msg;
                }

                function resetTrivia() {
                    document.getElementById('trivia-results').style.display = 'none';
                    document.getElementById('trivia-select').style.display = 'block';
                }
            </script>
